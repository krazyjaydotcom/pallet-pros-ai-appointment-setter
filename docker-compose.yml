services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pallet_pros_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: .
    command: npm run dev:web
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
    command: npm run dev:worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
